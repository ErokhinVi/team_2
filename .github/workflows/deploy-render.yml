name: Deploy services via Render API

# Селективный редеплой через Render REST API. autoDeploy у самих сервисов
# выключен — деплой триггерит ТОЛЬКО этот workflow, по факту изменения папки
# блока. Секрет репозитория: RENDER_API_KEY (Bearer-токен Render-аккаунта).
#
# Каждый блок — ОТДЕЛЬНЫЙ job матрицы со СВОЕЙ concurrency-группой
# (render-deploy-<ref>-<block>). Иначе при общей группе и cancel-in-progress:false
# GitHub держит в очереди лишь один pending-ран, и средний из трёх близких по
# времени пушей вытесняется самым новым (cancelled) — его сервис молча НЕ выезжает.
# С группой на (ветка × блок) пуши разных блоков идут независимо; повторный пуш
# ОДНОГО блока отменяет лишь свой незавершённый триггер (выезжает последний).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: "Что передеплоить (через запятую: backend,cib,retail или 'all')"
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        block: [backend, cib, retail]
    concurrency:
      group: render-deploy-${{ github.ref }}-${{ matrix.block }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Deploy ${{ matrix.block }} via Render API
        env:
          MANUAL: ${{ inputs.services }}
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          BLOCK: ${{ matrix.block }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SID_BACKEND: srv-d8bjkpernols73ctqa90
          SID_CIB: srv-d8bjkq37uimc73dpves0
          SID_RETAIL: srv-d8bjkr3eo5us738o11hg
        run: |
          set -e
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::secret RENDER_API_KEY is empty"
            exit 1
          fi
          case "$BLOCK" in
            backend) SID="$SID_BACKEND";;
            cib)     SID="$SID_CIB";;
            retail)  SID="$SID_RETAIL";;
          esac

          # Нужно ли деплоить ЭТОТ блок?
          if [ "$EVENT" = "workflow_dispatch" ]; then
            REQ="${MANUAL:-all}"
            if [ "$REQ" = "all" ] || echo ",$REQ," | grep -q ",$BLOCK,"; then
              HIT=yes
            else
              HIT=no
            fi
          else
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              CHANGED=$(git ls-files)
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || true)
            fi
            HIT=no
            # своя папка блока изменилась
            echo "$CHANGED" | grep -qE "^${BLOCK}/" && HIT=yes
            # render.yaml меняет конфиг всех трёх сервисов
            echo "$CHANGED" | grep -qE "^render\.yaml$" && HIT=yes
            # seed/ грузит только backend
            if [ "$BLOCK" = "backend" ]; then
              echo "$CHANGED" | grep -qE "^seed/" && HIT=yes
            fi
          fi

          if [ "$HIT" != "yes" ]; then
            echo "skip $BLOCK — его папка не менялась в этом пуше"
            exit 0
          fi
          if [ -z "$SID" ]; then
            echo "::error::service id для $BLOCK не задан"
            exit 1
          fi
          echo " → trigger $BLOCK ($SID)"
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$SID/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
            echo "::error::Render API returned $HTTP for $BLOCK"
            cat /tmp/resp.json
            exit 1
          fi
          echo "   ok: deploy $(python3 -c 'import json; print(json.load(open("/tmp/resp.json")).get("id","?"))')"
