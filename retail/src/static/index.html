<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=414,initial-scale=1" />
  <title>Райф · мобильный банк · проверка связи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f6f3ec;
      --surface:   #ffffff;
      --rule:      #e3ddcc;
      --text:      #1f1d18;
      --text-2:    #5a564c;
      --muted:     #8a857a;
      --raiff:     #FFE600;
      --raiff-soft:#fff7a0;
      --good:      #2f7a3a;
      --warn:      #a4662d;
      --bad:       #b14b32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Geist", -apple-system, system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .phone {
      max-width: 420px; margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      box-shadow: 0 0 60px rgba(60,52,40,0.08);
      position: relative;
    }

    /* вертолётик пролетает над верхом главного экрана */
    .heli-strip {
      position: absolute; left: 0; right: 0; top: 56px; height: 42px;
      overflow: hidden; pointer-events: none; z-index: 9;
    }
    .heli {
      position: absolute; left: 0; top: 6px;
      font-size: 24px; line-height: 1;
      animation: heli-fly 6.5s linear infinite;
      will-change: transform;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
    }
    @keyframes heli-fly {
      0%   { transform: translate(-60px, 4px) rotate(-4deg); }
      25%  { transform: translate(120px, -8px) rotate(3deg); }
      50%  { transform: translate(230px, 2px) rotate(-3deg); }
      75%  { transform: translate(350px, -8px) rotate(3deg); }
      100% { transform: translate(480px, 4px) rotate(-4deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .heli { animation: none; left: 50%; transform: translateX(-50%); }
    }
    .topbar {
      background: var(--text); color: var(--bg);
      padding: 28px 22px 16px;
    }
    .topbar .logo {
      width: 26px; height: 26px;
      background: var(--raiff); display: inline-block;
      border-radius: 4px; vertical-align: middle;
      margin-right: 10px;
    }
    .topbar .name {
      font-weight: 500; font-size: 16px; vertical-align: middle;
    }
    .topbar .who {
      font-size: 12px; color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    .balance {
      padding: 26px 22px 22px;
      background: linear-gradient(180deg, var(--text) 0%, #2c2823 100%);
      color: var(--bg);
    }
    .balance .l {
      font-size: 11px; opacity: 0.6;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .balance .v {
      font-size: 32px; font-weight: 500; margin-top: 6px;
      letter-spacing: -0.01em;
    }
    .balance .v .cur { font-size: 18px; opacity: 0.7; margin-left: 4px; }

    .tabs {
      display: flex; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 5;
    }
    .tabs button {
      flex: 1;
      padding: 14px 8px;
      background: transparent; border: 0;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--text-2);
      cursor: pointer; position: relative;
      transition: color 160ms;
    }
    .tabs button.active { color: var(--text); }
    .tabs button.active::after {
      content: ""; position: absolute;
      left: 24%; right: 24%; bottom: 0;
      height: 2px; background: var(--text);
    }

    .tab-pane { display: none; padding: 22px; }
    .tab-pane.show { display: block; }

    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin: 6px 0 10px;
    }

    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 12px;
      color: var(--text-2); margin-bottom: 4px;
    }
    .form-row input, .form-row select {
      width: 100%; padding: 10px 12px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--rule); border-radius: 6px;
      font-family: inherit; font-size: 14px;
      transition: border-color 160ms;
    }
    .form-row input:focus, .form-row select:focus {
      outline: 0; border-color: var(--text);
    }

    .btn {
      width: 100%; padding: 13px;
      background: var(--text); color: var(--bg);
      border: 0; border-radius: 8px;
      font-family: inherit; font-weight: 500; font-size: 14px;
      letter-spacing: 0.01em; cursor: pointer;
      transition: background 160ms;
    }
    .btn:hover { background: #2c2823; }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: var(--raiff); color: var(--text);
    }
    .btn.primary:hover { background: #fff04a; }

    .tx-list { display: flex; flex-direction: column; gap: 0; }
    .tx-row {
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
      display: grid; grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .tx-row:last-child { border-bottom: 0; }
    .tx-row .desc { font-size: 13px; }
    .tx-row .ts { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .tx-row .amt { font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
    .tx-row .amt.minus { color: var(--text); }
    .tx-row .amt.plus  { color: var(--good); }

    .empty {
      text-align: center; padding: 60px 0;
      color: var(--muted); font-size: 13px;
    }

    .alert {
      margin-top: 18px; padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px; line-height: 1.5;
    }
    .alert.ok    { background: #e8f0e2; color: var(--good); }
    .alert.info  { background: #f0e8d0; color: var(--warn); }
    .alert.error { background: #f4dfd6; color: var(--bad); }

    .client-picker { padding: 14px 22px; border-bottom: 1px solid var(--rule); }
    .client-picker label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .client-picker select { width: 100%; margin-top: 4px; padding: 8px 10px;
      border: 1px solid var(--rule); background: var(--surface); border-radius: 6px;
      font-family: inherit; font-size: 13px; }

    .product {
      display: grid; grid-template-columns: 1fr auto; gap: 6px;
      padding: 12px 0; border-bottom: 1px solid var(--rule); align-items: center;
    }
    .product:last-child { border-bottom: 0; }
    .product .pname { font-size: 13px; font-weight: 500; }
    .product .pkind { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .product .prate { font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
    .product .prate small { display: block; font-weight: 400; color: var(--muted); font-size: 10px; }

    .decision { margin-top: 10px; }
    .decision .dl {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--rule); font-size: 13px;
    }
    .decision .dl:last-child { border-bottom: 0; }
    .decision .dl .k { color: var(--text-2); }
    .decision .dl .v { font-weight: 500; font-variant-numeric: tabular-nums; text-align: right; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="heli-strip"><span class="heli">🚁</span></div>
    <div class="topbar">
      <div><span class="logo"></span><span class="name">Райф</span></div>
      <div class="who" id="topbar-who"></div>
    </div>

    <div class="balance">
      <div class="l">остаток на счёте</div>
      <div class="v"><span id="balance-v">—</span><span class="cur">₽</span></div>
    </div>

    <div class="client-picker">
      <label>Профиль</label>
      <select id="client-select"></select>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="transfers">Переводы</button>
      <button class="tab" data-tab="credits">Кредиты</button>
    </div>

    <div class="tab-pane show" data-pane="transfers">
      <div class="section-title">Перевести</div>
      <form id="transfer-form" autocomplete="off">
        <div class="form-row">
          <label>Кому</label>
          <input name="to" placeholder="имя или ID получателя" />
        </div>
        <div class="form-row">
          <label>Сумма, ₽</label>
          <input name="amount" type="number" min="1" placeholder="0" />
        </div>
        <button class="btn primary" type="submit">Перевести</button>
      </form>
      <div id="transfer-result"></div>

      <div class="section-title" style="margin-top:24px">Последние операции</div>
      <div id="tx-list" class="tx-list"></div>
    </div>

    <div class="tab-pane" data-pane="credits">
      <div class="section-title">Кредитные продукты</div>
      <div id="credit-products"><div class="empty">Загружаем каталог…</div></div>

      <div class="section-title" style="margin-top:24px">Заявка на кредит</div>
      <form id="credit-form" autocomplete="off">
        <div class="form-row">
          <label>Продукт</label>
          <select name="product" id="credit-product"></select>
        </div>
        <div class="form-row">
          <label>Сумма, ₽</label>
          <input name="amount" type="number" min="1" placeholder="например, 300000" />
        </div>
        <div class="form-row">
          <label>Срок, мес.</label>
          <input name="term" type="number" min="1" value="12" />
        </div>
        <button class="btn primary" type="submit">Оформить заявку</button>
      </form>
      <div id="credit-result"></div>
    </div>
  </div>

  <script>
  (function(){
    "use strict";
    const fmt = new Intl.NumberFormat("ru-RU");
    const sel = document.getElementById("client-select");
    const balanceV = document.getElementById("balance-v");
    const topbarWho = document.getElementById("topbar-who");
    const txList = document.getElementById("tx-list");
    const transferResult = document.getElementById("transfer-result");

    // ---- табы ----
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("show"));
        btn.classList.add("active");
        document.querySelector(`[data-pane="${btn.dataset.tab}"]`).classList.add("show");
      });
    });

    // ---- загрузка списка клиентов в селект ----
    async function loadClients() {
      try {
        const r = await fetch("/clients?limit=200");
        const d = await r.json();
        const items = (d.items || []).slice(0, 80);
        sel.innerHTML = items.map(c =>
          `<option value="${c.id}" data-balance="${c.balance_rub}" data-name="${c.name}" data-segment="${c.segment}">
            ${c.name}
          </option>`
        ).join("");
        if (items.length) onPickClient();
      } catch(e) { console.error(e); }
    }

    function onPickClient() {
      const opt = sel.selectedOptions[0];
      if (!opt) return;
      balanceV.textContent = fmt.format(+opt.dataset.balance || 0);
      topbarWho.textContent = opt.dataset.name;
      loadTx(opt.value);
    }
    sel.addEventListener("change", onPickClient);

    // ---- последние операции ----
    async function loadTx(clientId) {
      try {
        const r = await fetch(`/transactions/${clientId}?limit=10`);
        const d = await r.json();
        const items = d.items || [];
        if (!items.length) {
          txList.innerHTML = `<div class="empty">Операций пока нет</div>`;
          return;
        }
        txList.innerHTML = items.map(t => {
          const sign = t.amount_rub >= 0 ? "plus" : "minus";
          const amt = (t.amount_rub >= 0 ? "+" : "−") + fmt.format(Math.abs(t.amount_rub));
          const niceTs = t.ts.replace("T", " ").slice(0, 16);
          return `<div class="tx-row">
            <div>
              <div class="desc">${typeLabel(t.type)}</div>
              <div class="ts">${niceTs}</div>
            </div>
            <div class="amt ${sign}">${amt} ₽</div>
          </div>`;
        }).join("");
      } catch(e) {
        txList.innerHTML = `<div class="empty">Не удалось загрузить операции</div>`;
      }
    }

    function typeLabel(t) {
      return ({
        transfer_in:    "Перевод входящий",
        transfer_out:   "Перевод исходящий",
        card_purchase:  "Оплата картой",
        atm_withdraw:   "Снятие в банкомате",
        salary:         "Зарплата",
        utility_payment:"Коммунальные",
      })[t] || t;
    }

    function setBalance(newAmount) {
      balanceV.textContent = fmt.format(newAmount);
      const opt = sel.selectedOptions[0];
      if (opt) opt.dataset.balance = newAmount;
    }

    // ---- форма перевода ----
    const transferForm = document.getElementById("transfer-form");
    transferForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      transferResult.innerHTML = "";
      const opt = sel.selectedOptions[0];
      if (!opt) return;
      const data = new FormData(ev.target);
      const to = (data.get("to") || "").trim();
      const amount = +data.get("amount");
      if (!to || amount <= 0) {
        transferResult.innerHTML = `<div class="alert error">введи получателя и сумму</div>`;
        return;
      }

      const payload = {
        from_client_id: opt.value,
        to: to,
        amount_rub: amount,
      };
      try {
        const r = await fetch("/api/transfer", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (r.ok) {
          const kindLabel = d.kind === "internal"
            ? `${d.to} (клиент банка)`
            : `${d.to} (внешний счёт)`;
          transferResult.innerHTML =
            `<div class="alert ok">Отправлено ${fmt.format(d.amount_rub)} ₽<br/>
             получатель: ${kindLabel}</div>`;
          setBalance(d.new_balance_rub);
          transferForm.reset();
          loadTx(opt.value);
        } else {
          transferResult.innerHTML =
            `<div class="alert error">${d.detail || "ошибка"}</div>`;
        }
      } catch(e) {
        transferResult.innerHTML =
          `<div class="alert error">сервер не ответил</div>`;
      }
    });

    // ---- кредиты ----
    const creditProducts = document.getElementById("credit-products");
    const creditProductSel = document.getElementById("credit-product");
    const creditResult = document.getElementById("credit-result");

    function isCreditKind(kind) {
      const k = String(kind || "").toLowerCase();
      return k.includes("credit") || k.includes("loan") || k.includes("кредит")
          || k.includes("ипотек") || k.includes("рассроч") || k.includes("займ");
    }

    async function loadProducts() {
      try {
        const r = await fetch("/products");
        const d = await r.json();
        const items = d.items || [];
        const credit = items.filter(p => isCreditKind(p.kind));
        creditProductSel.innerHTML =
          `<option value="">— на усмотрение банка —</option>` +
          credit.map(p =>
            `<option value="${p.id}">${p.name || p.id}${p.rate_pct!=null?` · ${p.rate_pct}%`:""}</option>`
          ).join("");
        if (!credit.length) {
          creditProducts.innerHTML =
            `<div class="empty">Кредитные продукты ещё не добавлены в каталог —
             появятся, когда коллега из блока решений их опубликует.</div>`;
          return;
        }
        creditProducts.innerHTML = credit.map(p => {
          const rate = (p.rate_pct != null)
            ? `<div class="prate">${p.rate_pct}%<small>ставка</small></div>`
            : `<div class="prate"></div>`;
          return `<div class="product">
            <div>
              <div class="pname">${p.name || p.id}</div>
              <div class="pkind">${p.kind || ""}</div>
            </div>
            ${rate}
          </div>`;
        }).join("");
      } catch(e) {
        creditProducts.innerHTML =
          `<div class="empty">Каталог недоступен (блок решений ещё не на связи)</div>`;
        creditProductSel.innerHTML = `<option value="">— без выбора —</option>`;
      }
    }

    const creditForm = document.getElementById("credit-form");
    creditForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      creditResult.innerHTML = "";
      const opt = sel.selectedOptions[0];
      if (!opt) { creditResult.innerHTML = `<div class="alert error">сначала выбери профиль</div>`; return; }
      const data = new FormData(ev.target);
      const amount = +data.get("amount");
      const term = +data.get("term");
      if (amount <= 0) {
        creditResult.innerHTML = `<div class="alert error">введи сумму</div>`;
        return;
      }
      const payload = {
        client_id: opt.value,
        product_id: data.get("product") || null,
        amount_rub: amount,
        term_months: term || null,
      };
      creditResult.innerHTML = `<div class="alert info">Отправляем заявку…</div>`;
      try {
        const r = await fetch("/api/credit-apply", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (!r.ok) {
          creditResult.innerHTML = `<div class="alert error">${d.detail || "ошибка"}</div>`;
          return;
        }
        renderDecision(d);
      } catch(e) {
        creditResult.innerHTML = `<div class="alert error">сервер не ответил</div>`;
      }
    });

    function renderDecision(d) {
      if (d.decision === "pending_integration") {
        creditResult.innerHTML =
          `<div class="alert info">Заявка собрана, клиент проверен по данным банка.
           Решение пока не вынесено: ${d.message || "блок решений ещё не подключён"}.</div>`;
        return;
      }
      const res = d.result || d;
      let verdict = res.decision ?? res.status ?? res.approved ?? res.result;
      if (typeof verdict === "string") verdict = verdict.toLowerCase();
      const ok  = [true, "approved", "approve", "ok", "yes", "accepted", "одобрено", "одобрен"].includes(verdict);
      const bad = [false, "declined", "denied", "rejected", "reject", "no", "отказ", "отказано"].includes(verdict);
      const cls  = ok ? "ok" : (bad ? "error" : "info");
      const head = ok ? "Заявка одобрена" : (bad ? "Отказано" : "Заявка обработана");

      const rows = [];
      const push = (k, v) => { if (v !== undefined && v !== null && v !== "") rows.push([k, v]); };
      push("Одобренная сумма", res.approved_amount_rub != null ? fmt.format(res.approved_amount_rub)+" ₽" : null);
      push("Ставка", res.rate_pct != null ? res.rate_pct+"%" : null);
      push("Срок", res.term_months != null ? res.term_months+" мес." : null);
      push("Платёж в месяц", res.monthly_payment_rub != null ? fmt.format(res.monthly_payment_rub)+" ₽" : null);
      push("Причина", res.reason || res.message);
      if (!rows.length) {
        Object.entries(res).forEach(([k, v]) => {
          if (v !== null && typeof v !== "object") push(k, String(v));
        });
      }
      const rowsHtml = rows.map(([k, v]) =>
        `<div class="dl"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("");
      creditResult.innerHTML =
        `<div class="alert ${cls}">${head}${d.client && d.client.name ? " · "+d.client.name : ""}</div>
         <div class="decision">${rowsHtml}</div>`;
    }

    loadClients();
    loadProducts();
  })();
  </script>
</body>
</html>
