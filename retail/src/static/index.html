<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=414,initial-scale=1" />
  <title>Райф · мобильный банк</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f6f3ec;
      --surface:   #ffffff;
      --rule:      #e3ddcc;
      --text:      #1f1d18;
      --text-2:    #5a564c;
      --muted:     #8a857a;
      --raiff:     #FFE600;
      --raiff-soft:#fff7a0;
      --good:      #2f7a3a;
      --warn:      #a4662d;
      --bad:       #b14b32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Geist", -apple-system, system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    .phone {
      max-width: 420px; margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      box-shadow: 0 0 60px rgba(60,52,40,0.08);
    }
    .topbar {
      background: var(--text); color: var(--bg);
      padding: 28px 22px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .topbar .left { flex: 1; }
    .topbar .logo {
      width: 26px; height: 26px;
      background: var(--raiff); display: inline-block;
      border-radius: 4px; vertical-align: middle;
      margin-right: 10px;
    }
    .topbar .name {
      font-weight: 500; font-size: 16px; vertical-align: middle;
    }
    .topbar .who {
      font-size: 12px; color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .lang-toggle {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--bg);
      font-family: inherit; font-size: 12px; font-weight: 500;
      padding: 5px 10px;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 160ms;
      white-space: nowrap;
      margin-top: 2px;
    }
    .lang-toggle:hover { background: rgba(255,255,255,0.22); }

    .balance {
      padding: 26px 22px 22px;
      background: linear-gradient(180deg, var(--text) 0%, #2c2823 100%);
      color: var(--bg);
    }
    .balance .l {
      font-size: 11px; opacity: 0.6;
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .balance .v {
      font-size: 32px; font-weight: 500; margin-top: 6px;
      letter-spacing: -0.01em;
    }
    .balance .v .cur { font-size: 18px; opacity: 0.7; margin-left: 4px; }

    .tabs {
      display: flex; gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      position: sticky; top: 0; z-index: 5;
    }
    .tabs button {
      flex: 1;
      padding: 14px 4px;
      background: transparent; border: 0;
      font-family: inherit; font-size: 12px; font-weight: 500;
      color: var(--text-2);
      cursor: pointer; position: relative;
      transition: color 160ms;
    }
    .tabs button.active { color: var(--text); }
    .tabs button.active::after {
      content: ""; position: absolute;
      left: 18%; right: 18%; bottom: 0;
      height: 2px; background: var(--text);
    }

    .tab-pane { display: none; padding: 22px; }
    .tab-pane.show { display: block; }

    .section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin: 6px 0 10px;
    }

    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 12px;
      color: var(--text-2); margin-bottom: 4px;
    }
    .form-row input, .form-row select {
      width: 100%; padding: 10px 12px;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--rule); border-radius: 6px;
      font-family: inherit; font-size: 14px;
      transition: border-color 160ms;
    }
    .form-row input:focus, .form-row select:focus {
      outline: 0; border-color: var(--text);
    }

    .btn {
      width: 100%; padding: 13px;
      background: var(--text); color: var(--bg);
      border: 0; border-radius: 8px;
      font-family: inherit; font-weight: 500; font-size: 14px;
      letter-spacing: 0.01em; cursor: pointer;
      transition: background 160ms;
    }
    .btn:hover { background: #2c2823; }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: var(--raiff); color: var(--text);
    }
    .btn.primary:hover { background: #fff04a; }

    .tx-list { display: flex; flex-direction: column; gap: 0; }
    .tx-row {
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
      display: grid; grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .tx-row:last-child { border-bottom: 0; }
    .tx-row .desc { font-size: 13px; }
    .tx-row .ts { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .tx-row .amt { font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
    .tx-row .amt.minus { color: var(--text); }
    .tx-row .amt.plus  { color: var(--good); }

    .empty {
      text-align: center; padding: 60px 0;
      color: var(--muted); font-size: 13px;
    }

    .alert {
      margin-top: 18px; padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px; line-height: 1.5;
    }
    .alert.ok    { background: #e8f0e2; color: var(--good); }
    .alert.info  { background: #f0e8d0; color: var(--warn); }
    .alert.error { background: #f4dfd6; color: var(--bad); }

    .client-picker { padding: 14px 22px; border-bottom: 1px solid var(--rule); }
    .client-picker label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .client-picker select { width: 100%; margin-top: 4px; padding: 8px 10px;
      border: 1px solid var(--rule); background: var(--surface); border-radius: 6px;
      font-family: inherit; font-size: 13px; }

    /* ---- Loan product cards ---- */
    .product-cards { display: flex; flex-direction: column; gap: 12px; }
    .product-card {
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 16px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 160ms, box-shadow 160ms;
    }
    .product-card:hover { border-color: var(--text-2); }
    .product-card.selected {
      border-color: var(--text);
      box-shadow: 0 0 0 1px var(--text);
    }
    .product-card .pc-name {
      font-weight: 500; font-size: 15px; margin-bottom: 4px;
    }
    .product-card .pc-detail {
      font-size: 12px; color: var(--text-2);
    }
    .product-card .pc-rate {
      display: inline-block; margin-top: 8px;
      background: var(--raiff); color: var(--text);
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 10px;
    }

    .loan-result { margin-top: 18px; }
    .loan-result .decision-box, .cc-decision-box {
      padding: 18px; border-radius: 10px; text-align: center;
    }
    .loan-result .decision-box.approved, .cc-decision-box.approved {
      background: #e8f0e2; color: var(--good);
    }
    .loan-result .decision-box.declined, .cc-decision-box.declined {
      background: #f4dfd6; color: var(--bad);
    }
    .decision-icon { font-size: 32px; margin-bottom: 6px; }
    .decision-status { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .decision-detail { font-size: 13px; opacity: 0.85; }

    .products-loading {
      text-align: center; padding: 40px 0;
      color: var(--muted); font-size: 13px;
    }

    /* ---- Card visuals (shared between debit and credit) ---- */
    .debit-card, .credit-card-visual {
      border-radius: 16px;
      padding: 24px 22px 20px;
      color: #f6f3ec;
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
    }
    .debit-card {
      background: linear-gradient(135deg, #1f1d18 0%, #3a362e 60%, #1f1d18 100%);
    }
    .credit-card-visual {
      background: linear-gradient(135deg, #1a2744 0%, #2d4a7a 50%, #1a2744 100%);
    }
    .debit-card::before, .credit-card-visual::before {
      content: "";
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      border-radius: 50%;
      opacity: 0.15;
    }
    .debit-card::before { background: var(--raiff); }
    .credit-card-visual::before { background: #7eb3ff; }
    .card-bank {
      font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; opacity: 0.5;
      margin-bottom: 20px;
    }
    .card-number {
      font-size: 18px; font-weight: 400;
      letter-spacing: 0.12em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 18px;
    }
    .card-bottom {
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .card-holder {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.08em; opacity: 0.8;
    }
    .card-type {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 8px;
    }
    .debit-card .card-type {
      background: var(--raiff); color: var(--text);
    }
    .credit-card-visual .card-type {
      background: #7eb3ff; color: #1a2744;
    }

    .cashback-summary, .cc-summary {
      display: flex; gap: 12px; margin-bottom: 18px;
    }
    .cashback-box, .cc-box {
      flex: 1;
      background: var(--bg);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .cashback-box .cb-value, .cc-box .cc-value {
      font-size: 22px; font-weight: 600;
    }
    .cashback-box .cb-value { color: var(--good); }
    .cc-box .cc-value { color: var(--text); }
    .cc-box .cc-value.warn { color: var(--warn); }
    .cashback-box .cb-label, .cc-box .cc-label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    .cashback-tx-row {
      padding: 10px 0;
      border-bottom: 1px solid var(--rule);
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .cashback-tx-row:last-child { border-bottom: 0; }
    .cashback-tx-row .cb-tx-desc { font-size: 13px; }
    .cashback-tx-row .cb-tx-ts { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .cashback-tx-row .cb-tx-amount { font-size: 13px; color: var(--text-2); text-align: right; }
    .cashback-tx-row .cb-tx-cashback {
      font-size: 13px; font-weight: 600; color: var(--good);
      text-align: right; white-space: nowrap;
    }

    /* ---- Credit card specifics ---- */
    .cc-limit-bar {
      background: var(--bg); border-radius: 8px;
      height: 10px; margin-bottom: 18px;
      overflow: hidden;
    }
    .cc-limit-bar .cc-used {
      height: 100%; border-radius: 8px;
      background: var(--warn);
      transition: width 300ms;
    }
    .cc-limit-bar .cc-used.low { background: var(--good); }
    .cc-limit-bar .cc-used.high { background: var(--bad); }

    .cc-details {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 18px;
    }
    .cc-detail-row {
      display: flex; justify-content: space-between;
      font-size: 13px;
    }
    .cc-detail-row .cc-dl { color: var(--text-2); }
    .cc-detail-row .cc-dv { font-weight: 500; }

    .cc-not-eligible {
      text-align: center; padding: 30px 0;
      color: var(--muted); font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="topbar">
      <div class="left">
        <div><span class="logo"></span><span class="name">Райф</span></div>
        <div class="who" id="topbar-who"></div>
      </div>
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>

    <div class="balance">
      <div class="l" data-i18n="balance_label">остаток на счёте</div>
      <div class="v"><span id="balance-v">—</span><span class="cur">₽</span></div>
    </div>

    <div class="client-picker">
      <label data-i18n="profile">Профиль</label>
      <select id="client-select"></select>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="transfers" data-i18n="transfers_tab">Переводы</button>
      <button class="tab" data-tab="card" data-i18n="card_tab">Карта</button>
      <button class="tab" data-tab="creditcard" data-i18n="cc_tab">Кредитная</button>
      <button class="tab" data-tab="loans" data-i18n="loans_tab">Кредиты</button>
    </div>

    <!-- ===== Transfers pane ===== -->
    <div class="tab-pane show" data-pane="transfers">
      <div class="section-title" data-i18n="transfer_title">Перевести</div>
      <form id="transfer-form" autocomplete="off">
        <div class="form-row">
          <label data-i18n="to_label">Кому</label>
          <input name="to" data-i18n-placeholder="to_placeholder" placeholder="имя или ID получателя" />
        </div>
        <div class="form-row">
          <label data-i18n="amount_label">Сумма, ₽</label>
          <input name="amount" type="number" min="1" placeholder="0" />
        </div>
        <button class="btn primary" type="submit" data-i18n="transfer_btn">Перевести</button>
      </form>
      <div id="transfer-result"></div>
      <div class="section-title" style="margin-top:24px" data-i18n="recent_ops">Последние операции</div>
      <div id="tx-list" class="tx-list"></div>
    </div>

    <!-- ===== Debit Card pane ===== -->
    <div class="tab-pane" data-pane="card">
      <div id="card-container">
        <div class="products-loading" data-i18n="loading_card">Загрузка карты...</div>
      </div>
    </div>

    <!-- ===== Credit Card pane ===== -->
    <div class="tab-pane" data-pane="creditcard">
      <div id="cc-container">
        <div class="products-loading" data-i18n="loading_cc">Загрузка кредитной карты...</div>
      </div>
    </div>

    <!-- ===== Loans pane ===== -->
    <div class="tab-pane" data-pane="loans">
      <div class="section-title" data-i18n="choose_product">Выберите продукт</div>
      <div id="product-list" class="product-cards">
        <div class="products-loading" data-i18n="loading_products">Загрузка продуктов...</div>
      </div>
      <div id="loan-apply-section" style="display:none; margin-top: 20px;">
        <div class="section-title" data-i18n="loan_amount_title">Сумма кредита</div>
        <form id="loan-form" autocomplete="off">
          <div class="form-row">
            <label data-i18n="desired_amount">Желаемая сумма, ₽</label>
            <input name="loan_amount" type="number" min="1000" step="1000" placeholder="100 000" />
          </div>
          <button class="btn primary" type="submit" data-i18n="apply_btn">Подать заявку</button>
        </form>
      </div>
      <div id="loan-result" class="loan-result"></div>
    </div>
  </div>

  <script>
  (function(){
    "use strict";

    // ---- i18n ----
    const i18n = {

    let lang = localStorage.getItem("raif_lang") || "ru";

    function t(key) { return (i18n[lang] || i18n.ru)[key] || key; }

    function applyLang() {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
      document.getElementById("lang-toggle").textContent = t("toggle_label");
      const opt = sel.selectedOptions[0];
      if (opt) {
        loadTx(opt.value);
        loadCardInfo(opt.value);
        loadCreditCard(opt.value);
      }
      if (productsData.length) renderProducts();
    }

    document.getElementById("lang-toggle").addEventListener("click", () => {
      lang = lang === "ru" ? "en" : "ru";
      localStorage.setItem("raif_lang", lang);
      applyLang();
    });

    const fmt = new Intl.NumberFormat("ru-RU");
    const sel = document.getElementById("client-select");
    const balanceV = document.getElementById("balance-v");
    const topbarWho = document.getElementById("topbar-who");
    const txList = document.getElementById("tx-list");
    const transferResult = document.getElementById("transfer-result");
    const productList = document.getElementById("product-list");
    const loanApplySection = document.getElementById("loan-apply-section");
    const loanResult = document.getElementById("loan-result");
    const cardContainer = document.getElementById("card-container");
    const ccContainer = document.getElementById("cc-container");

    // ---- tabs ----
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-pane").forEach(p => p.classList.remove("show"));
        btn.classList.add("active");
        document.querySelector(`[data-pane="${btn.dataset.tab}"]`).classList.add("show");
        const opt = sel.selectedOptions[0];
        if (opt && btn.dataset.tab === "card") loadCardInfo(opt.value);
        if (opt && btn.dataset.tab === "creditcard") loadCreditCard(opt.value);
      });
    });

    // ---- load clients ----
    async function loadClients() {
      try {
        const r = await fetch("/clients?limit=200");
        const d = await r.json();
        const items = (d.items || []).slice(0, 80);
        sel.innerHTML = items.map(c =>
          `<option value="${c.id}" data-balance="${c.balance_rub}" data-name="${c.name}" data-segment="${c.segment}">
            ${c.name}
          </option>`
        ).join("");
        if (items.length) onPickClient();
      } catch(e) { console.error(e); }
    }

    function onPickClient() {
      const opt = sel.selectedOptions[0];
      if (!opt) return;
      balanceV.textContent = fmt.format(+opt.dataset.balance || 0);
      topbarWho.textContent = opt.dataset.name;
      loadTx(opt.value);
      loadCardInfo(opt.value);
      loadCreditCard(opt.value);
      loanResult.innerHTML = "";
    }
    sel.addEventListener("change", onPickClient);

    // ---- transactions ----
    async function loadTx(clientId) {
      try {
        const r = await fetch(`/transactions/${clientId}?limit=10`);
        const d = await r.json();
        const items = d.items || [];
        if (!items.length) {
          txList.innerHTML = `<div class="empty">${t("no_ops")}</div>`;
          return;
        }
        txList.innerHTML = items.map(tx => {
          const sign = tx.amount_rub >= 0 ? "plus" : "minus";
          const amt = (tx.amount_rub >= 0 ? "+" : "−") + fmt.format(Math.abs(tx.amount_rub));
          const niceTs = tx.ts.replace("T", " ").slice(0, 16);
          return `<div class="tx-row">
            <div>
              <div class="desc">${typeLabel(tx.type)}</div>
              <div class="ts">${niceTs}</div>
            </div>
            <div class="amt ${sign}">${amt} ₽</div>
          </div>`;
        }).join("");
      } catch(e) {
        txList.innerHTML = `<div class="empty">${t("load_fail")}</div>`;
      }
    }

    function typeLabel(tp) { return t(tp) || tp; }

    function setBalance(newAmount) {
      balanceV.textContent = fmt.format(newAmount);
      const opt = sel.selectedOptions[0];
      if (opt) opt.dataset.balance = newAmount;
    }

    // ---- transfer form ----
    const transferForm = document.getElementById("transfer-form");
    transferForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      transferResult.innerHTML = "";
      const opt = sel.selectedOptions[0];
      if (!opt) return;
      const data = new FormData(ev.target);
      const to = (data.get("to") || "").trim();
      const amount = +data.get("amount");
      if (!to || amount <= 0) {
        transferResult.innerHTML = `<div class="alert error">${t("fill_fields")}</div>`;
        return;
      }
      const payload = { from_client_id: opt.value, to, amount_rub: amount };
      try {
        const r = await fetch("/api/transfer", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (r.ok) {
          const kindLabel = d.kind === "internal"
            ? `${d.to} (${t("bank_client")})` : `${d.to} (${t("external")})`;
          transferResult.innerHTML =
            `<div class="alert ok">${t("sent")} ${fmt.format(d.amount_rub)} ₽<br/>
             ${t("recipient")}: ${kindLabel}</div>`;
          setBalance(d.new_balance_rub);
          transferForm.reset();
          loadTx(opt.value);
        } else {
          transferResult.innerHTML = `<div class="alert error">${d.detail || t("error")}</div>`;
        }
      } catch(e) {
        transferResult.innerHTML = `<div class="alert error">${t("server_down")}</div>`;
      }
    });

    // ---- Debit card with cashback ----
    async function loadCardInfo(clientId) {
      try {
        const r = await fetch(`/api/card-info/${clientId}`);
        if (!r.ok) throw new Error("failed");
        renderCard(await r.json());
      } catch(e) {
        cardContainer.innerHTML = `<div class="empty">${t("card_error")}</div>`;
      }
    }

    function renderCard(data) {
      const cbTxs = data.cashback_transactions || [];
      let cbTxsHtml = "";
      if (cbTxs.length) {
        cbTxsHtml = cbTxs.map(tx => {
          const niceTs = tx.ts.replace("T", " ").slice(0, 16);
          return `<div class="cashback-tx-row">
            <div>
              <div class="cb-tx-desc">${typeLabel(tx.type)}</div>
              <div class="cb-tx-ts">${niceTs}</div>
            </div>
            <div class="cb-tx-amount">${fmt.format(Math.abs(tx.amount_rub))} ₽</div>
            <div class="cb-tx-cashback">+${fmt.format(tx.cashback_rub)} ₽</div>
          </div>`;
        }).join("");
      } else {
        cbTxsHtml = `<div class="empty">${t("no_cashback")}</div>`;
      }
      cardContainer.innerHTML = `
        <div class="debit-card">
          <div class="card-bank">Raiffeisen</div>
          <div class="card-number">${data.card_number_masked}</div>
          <div class="card-bottom">
            <div class="card-holder">${data.customer_name}</div>
            <div class="card-type">${t("debit_card")}</div>
          </div>
        </div>
        <div class="cashback-summary">
          <div class="cashback-box">
            <div class="cb-value">${fmt.format(data.total_cashback_rub)} ₽</div>
            <div class="cb-label">${t("cashback_earned")}</div>
          </div>
          <div class="cashback-box">
            <div class="cb-value">1%</div>
            <div class="cb-label">${t("cashback_rate")}</div>
          </div>
        </div>
        <div class="section-title">${t("cashback_history")}</div>
        <div class="tx-list">${cbTxsHtml}</div>`;
    }

    // ---- Credit card ----
    let ccData = null;

    async function loadCreditCard(clientId) {
      try {
        const r = await fetch(`/api/credit-card/${clientId}`);
        if (!r.ok) throw new Error("failed");
        ccData = await r.json();
        renderCreditCard(ccData);
      } catch(e) {
        ccContainer.innerHTML = `<div class="empty">${t("cc_error")}</div>`;
      }
    }

    function renderCreditCard(d) {
      if (!d.eligible) {
        ccContainer.innerHTML = `<div class="cc-not-eligible">
          ${t("cc_not_eligible")}<br/>
          <span style="font-size:12px;color:var(--muted)">${d.explanation || ""}</span>
        </div>`;
        return;
      }

      const usedPct = d.credit_limit_rub > 0
        ? Math.round((d.balance_owed_rub / d.credit_limit_rub) * 100) : 0;
      const barClass = usedPct < 30 ? "low" : usedPct > 70 ? "high" : "";

      const paymentSection = d.balance_owed_rub > 0 ? `
        <div class="section-title" style="margin-top:18px">${t("cc_pay_title")}</div>
        <form id="cc-pay-form" autocomplete="off">
          <div class="form-row">
            <label>${t("cc_pay_amount")}</label>
            <input name="cc_amount" type="number" min="1" placeholder="${fmt.format(d.min_payment_rub)}" />
          </div>
          <button class="btn primary" type="submit">${t("cc_pay_btn")}</button>
        </form>
        <div id="cc-pay-result"></div>
      ` : "";

      ccContainer.innerHTML = `
        <div class="credit-card-visual">
          <div class="card-bank">Raiffeisen</div>
          <div class="card-number">${d.card_number_masked}</div>
          <div class="card-bottom">
            <div class="card-holder">${d.customer_name}</div>
            <div class="card-type">${t("credit_card")}</div>
          </div>
        </div>

        <div class="cc-summary">
          <div class="cc-box">
            <div class="cc-value ${d.balance_owed_rub > 0 ? 'warn' : ''}">${fmt.format(d.balance_owed_rub)} ₽</div>
            <div class="cc-label">${t("cc_owed")}</div>
          </div>
          <div class="cc-box">
            <div class="cc-value">${fmt.format(d.available_rub)} ₽</div>
            <div class="cc-label">${t("cc_available")}</div>
          </div>
        </div>

        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
          ${fmt.format(d.balance_owed_rub)} ₽ ${t("cc_used_of")} ${fmt.format(d.credit_limit_rub)} ₽
        </div>
        <div class="cc-limit-bar">
          <div class="cc-used ${barClass}" style="width:${usedPct}%"></div>
        </div>

        <div class="cc-details">
          <div class="cc-detail-row">
            <span class="cc-dl">${t("cc_limit")}</span>
            <span class="cc-dv">${fmt.format(d.credit_limit_rub)} ₽</span>
          </div>
          ${d.min_payment_rub > 0 ? `<div class="cc-detail-row">
            <span class="cc-dl">${t("cc_min_payment")}</span>
            <span class="cc-dv">${fmt.format(d.min_payment_rub)} ₽</span>
          </div>` : ""}
          <div class="cc-detail-row">
            <span class="cc-dl">${t("cc_interest")}</span>
            <span class="cc-dv">${d.interest_rate_pct}%</span>
          </div>
          <div class="cc-detail-row">
            <span class="cc-dl">${t("cc_grace")}</span>
            <span class="cc-dv">${d.grace_period_days} ${t("cc_days")}</span>
          </div>
        </div>

        ${paymentSection}`;

      // Attach payment form handler
      const payForm = document.getElementById("cc-pay-form");
      if (payForm) {
        payForm.addEventListener("submit", async (ev) => {
          ev.preventDefault();
          const payResult = document.getElementById("cc-pay-result");
          payResult.innerHTML = "";
          const amount = +new FormData(ev.target).get("cc_amount");
          if (!amount || amount <= 0) {
            payResult.innerHTML = `<div class="alert error">${t("cc_fill_amount")}</div>`;
            return;
          }
          try {
            const r = await fetch("/api/credit-card-payment", {
              method: "POST", headers: {"Content-Type": "application/json"},
              body: JSON.stringify({ client_id: d.client_id, amount_rub: amount }),
            });
            const res = await r.json();
            if (r.ok) {
              payResult.innerHTML = `<div class="alert ok">${t("cc_pay_success")}: ${fmt.format(amount)} ₽</div>`;
              payForm.reset();
              // Refresh the credit card view
              setTimeout(() => loadCreditCard(d.client_id), 500);
            } else {
              payResult.innerHTML = `<div class="alert error">${res.detail || t("error")}</div>`;
            }
          } catch(e) {
            payResult.innerHTML = `<div class="alert error">${t("server_down")}</div>`;
          }
        });
      }
    }

    // ---- Loan products ----
    let productsData = [];
    let selectedProductId = null;

    async function loadProducts() {
      try {
        const r = await fetch("/products");
        const d = await r.json();
        productsData = (d.items || []).filter(p => p.kind === "credit" || p.kind === "loan");
        if (!productsData.length) productsData = d.items || [];
        renderProducts();
      } catch(e) {
        productList.innerHTML = `<div class="products-loading">${t("products_error")}</div>`;
      }
    }

    function renderProducts() {
      if (!productsData.length) {
        productList.innerHTML = `<div class="products-loading">${t("no_products")}</div>`;
        loanApplySection.style.display = "none";
        return;
      }
      productList.innerHTML = productsData.map(p => {
        const s = p.id === selectedProductId ? "selected" : "";
        const rateHtml = p.rate_pct != null
          ? `<span class="pc-rate">${t("rate_label")}: ${p.rate_pct}%</span>` : "";
        return `<div class="product-card ${s}" data-product-id="${p.id}">
          <div class="pc-name">${p.name}</div>
          <div class="pc-detail">${p.description || p.kind || ""}</div>
          ${rateHtml}
        </div>`;
      }).join("");
      productList.querySelectorAll(".product-card").forEach(card => {
        card.addEventListener("click", () => {
          selectedProductId = card.dataset.productId;
          productList.querySelectorAll(".product-card").forEach(c => c.classList.remove("selected"));
          card.classList.add("selected");
          loanApplySection.style.display = "block";
          loanResult.innerHTML = "";
        });
      });
    }

    // ---- Loan form ----
    const loanForm = document.getElementById("loan-form");
    loanForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      loanResult.innerHTML = "";
      const opt = sel.selectedOptions[0];
      if (!opt || !selectedProductId) return;
      const amount = +new FormData(ev.target).get("loan_amount");
      if (!amount || amount <= 0) {
        loanResult.innerHTML = `<div class="alert error">${t("fill_amount")}</div>`;
        return;
      }
      const payload = { client_id: opt.value, product_id: selectedProductId, amount_rub: amount };
      try {
        const r = await fetch("/api/credit-apply", {
          method: "POST", headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (r.ok) {
          const isApproved = d.status === "approved";
          const icon = isApproved ? "&#10003;" : "&#10007;";
          const cls = isApproved ? "approved" : "declined";
          const status = isApproved ? t("approved") : t("declined");
          let detail = isApproved
            ? `${t("approved_detail")}: ${fmt.format(d.max_amount_rub || amount)} ₽`
            : `${t("declined_detail")}`;
          if (d.reason) detail += `<br/>${t("reason_label")}: ${d.reason}`;
          loanResult.innerHTML = `<div class="decision-box ${cls}">
            <div class="decision-icon">${icon}</div>
            <div class="decision-status">${status}</div>
            <div class="decision-detail">${detail}</div>
          </div>`;
        } else {
          loanResult.innerHTML = `<div class="alert error">${d.detail || t("error")}</div>`;
        }
      } catch(e) {
        loanResult.innerHTML = `<div class="alert error">${t("server_down")}</div>`;
      }
    });

    loadClients();
    loadProducts();
    applyLang();
  })();
  </script>
</body>
</html>
