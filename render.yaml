# Render Blueprint: один командный репозиторий — 3 блока банка.
#
# Однократно в UI Render: New → Blueprint → Connect this repo → Apply.
# В env-группе ai-workshop-shared (создаётся один раз на аккаунт) уже должны
# быть заданы OPENAI_API_KEY и ADMIN_TOKEN (см. ORGANIZER.md в
# организаторском репо).
#
# ВНИМАНИЕ: значения b, <BACKEND_URL>, <CIB_URL> подставляются под
# конкретную команду при заведении репозитория (см. SETUP.md в
# организаторском репо). Пока стоят плейсхолдеры — не оставляй так на проде.

envVarGroups:
  - name: ai-workshop-shared
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ADMIN_TOKEN
        sync: false

services:
  - type: web
    name: raif-b-backend
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths: [backend/**, seed/**, render.yaml]
    envVars:
      - fromGroup: ai-workshop-shared
      - key: TEAM_NAME
        value: b

  - type: web
    name: raif-b-cib
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./cib/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths: [cib/**, render.yaml]
    envVars:
      - fromGroup: ai-workshop-shared
      - key: TEAM_NAME
        value: b
      - key: BACKEND_URL
        value: https://raif-b-backend.onrender.com

  - type: web
    name: raif-b-retail
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    dockerfilePath: ./retail/Dockerfile
    dockerContext: .
    rootDir: .
    buildFilter:
      paths: [retail/**, render.yaml]
    envVars:
      - fromGroup: ai-workshop-shared
      - key: TEAM_NAME
        value: b
      - key: BACKEND_URL
        value: https://raif-b-backend.onrender.com
      - key: CIB_URL
        value: https://raif-b-cib.onrender.com
